apiVersion: apps/v1
kind: Deployment
metadata:
  name: internal-mcp
  namespace: variant-internal
  labels:
    app: internal-mcp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: internal-mcp
  template:
    metadata:
      labels:
        app: internal-mcp
        azure.workload.identity/use: "true"  # Required for Workload Identity injection
    spec:
      serviceAccountName: internal-mcp-sa   # Must carry the workload identity annotation
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532    # Matches distroless/static:nonroot uid
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: internal-mcp
          image: variantplatformacr.azurecr.io/variant-internal-mcp:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: internal-mcp-config
          # AZURE_CLIENT_ID and AZURE_FEDERATED_TOKEN_FILE are injected by the
          # Workload Identity mutating webhook — no manual env entry needed.
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
